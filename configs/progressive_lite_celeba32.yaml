experiment_name: celeba32_progressive_attention_lite
seed: 42

data:
  dataset_name: celeba
  root: ./celeba
  image_size: 32
  channels: 3
  num_workers: 2
  pin_memory: true

train:
  batch_size: 8
  epochs: 20
  lr_g: 0.0002
  lr_d: 0.0002
  betas: [0.0, 0.99]
  log_every: 100
  sample_every: 1500
  checkpoint_every: 5
  n_critic: 1
  use_amp: true

model:
  latent_dim: 128
  base_channels: 128
  image_size: 32
  attention_enabled: true
  attention_mode: progressive
  fixed_attention_type: window_4
  attention_resolution: 16
  attention_num_heads: 4
  progressive_attention_schedule:
    - epoch_start: 1
      attention_type: window_4
    - epoch_start: 8
      attention_type: window_8
    - epoch_start: 15
      attention_type: global

eval:
  num_samples_for_fid: 5000
  save_dir: ./outputs
