experiment_name: celeba32_pam_progressive_smoke
seed: 42

data:
  dataset_name: celeba
  root: ./celeba
  image_size: 32
  channels: 3
  num_workers: 0
  pin_memory: true

train:
  batch_size: 16
  epochs: 4
  lr_g: 0.0001
  lr_d: 0.0001
  betas: [0.0, 0.99]
  log_every: 1
  sample_every: 10
  checkpoint_every: 1
  n_critic: 1
  use_amp: true

model:
  latent_dim: 128
  base_channels: 64
  image_size: 32
  attention_enabled: true
  attention_mode: progressive
  fixed_attention_type: window_4
  attention_resolution: 8
  attention_num_heads: 4
  attention_alpha: 0.05
  progressive_attention_schedule:
    - epoch_start: 1
      attention_type: none
    - epoch_start: 2
      attention_type: window_4
    - epoch_start: 4
      attention_type: window_8

eval:
  num_samples_for_fid: 1000
  save_dir: ./outputs
