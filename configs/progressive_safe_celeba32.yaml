experiment_name: celeba32_progressive_safe
seed: 42

data:
  dataset_name: celeba
  root: ./celeba
  image_size: 32
  channels: 3
  num_workers: 4
  pin_memory: true

train:
  batch_size: 16
  epochs: 50
  lr_g: 0.0002
  lr_d: 0.0002
  betas: [0.0, 0.99]
  log_every: 100
  sample_every: 500
  checkpoint_every: 1
  n_critic: 1
  use_amp: true

model:
  latent_dim: 128
  base_channels: 256
  image_size: 32
  stage_resolutions: [8, 16, 32]
  blocks_per_stage: 1
  use_positional_embeddings: true
  attention_schedule: ["window_4", "window_8", "window_16"]

eval:
  num_samples_for_fid: 5000
  save_dir: ./outputs
