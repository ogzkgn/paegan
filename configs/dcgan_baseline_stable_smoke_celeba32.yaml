experiment_name: celeba32_dcgan_baseline_stable_smoke
seed: 42

data:
  dataset_name: celeba
  root: ./celeba
  image_size: 32
  channels: 3
  num_workers: 0
  pin_memory: true

train:
  batch_size: 32
  epochs: 2
  lr_g: 0.0002
  lr_d: 0.0001
  betas: [0.0, 0.99]
  log_every: 10
  sample_every: 25
  checkpoint_every: 1
  n_critic: 1
  use_amp: true

model:
  latent_dim: 128
  base_channels: 64
  image_size: 32
  attention_enabled: false
  attention_mode: fixed
  fixed_attention_type: none
  attention_resolution: 16
  attention_num_heads: 4

eval:
  num_samples_for_fid: 1000
  save_dir: ./outputs
