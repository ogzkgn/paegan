experiment_name: celeba32_fixed_global_attention
seed: 42

data:
  dataset_name: celeba
  root: ./celeba
  image_size: 32
  channels: 3
  num_workers: 4
  pin_memory: true

train:
  batch_size: 64
  epochs: 50
  lr_g: 0.0002
  lr_d: 0.0002
  betas: [0.0, 0.99]
  log_every: 100
  sample_every: 500
  checkpoint_every: 1
  n_critic: 1
  use_amp: true

model:
  latent_dim: 128
  base_channels: 64
  image_size: 32
  attention_enabled: true
  attention_mode: fixed
  fixed_attention_type: global
  attention_resolution: 16
  attention_num_heads: 4

eval:
  num_samples_for_fid: 5000
  save_dir: ./outputs
